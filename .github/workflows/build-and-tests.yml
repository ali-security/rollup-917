name: CI
env:
  DEBUG: napi:*
  APP_NAME: rollup

on:
  push:
    branches:
      - master

      - main
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout Commit
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-07-25
      - name: Install Node Dependencies
        run: npm install
      - name: Build NAPI
        run: npm run build:napi -- --release --target x86_64-unknown-linux-gnu
      - name: Build JS (CJS for tests)
        run: npm run build:cjs
      - name: Copy Native Bindings
        run: npm run build:copy-native
      - name: Run Tests
        run: npm run test:only
        env:
          CI: true
